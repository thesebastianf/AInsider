services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ainsider-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ainsider}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-ainsider}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ainsider}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ainsider-net

  # ─── App (FastAPI Backend + React Frontend) ──────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ainsider-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4221}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ainsider}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-ainsider}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    networks:
      - ainsider-net

volumes:
  pgdata:
  app_logs:

networks:
  ainsider-net:
    driver: bridge
